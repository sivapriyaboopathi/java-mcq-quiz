<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java MCQ Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Page -->
    <div class="container" id="loginPage">

        <h2>Java MCQ Quiz</h2>

        <input type="text" id="name" placeholder="👤 Full Name">

        <input type="email" id="email" placeholder="📧 Email ID">

        <select id="department">
            <option value="">🏫 Select Department</option>
            <option>B.Sc Computer Science</option>
            <option>BCA</option>
            <option>B.Tech IT</option>
            <option>B.Tech CSE</option>
            <option>MCA</option>
            <option>Others</option>
        </select>

        <input type="text" id="regno" placeholder="🎓 Register Number">

        <button onclick="startQuiz()">▶️ Start Quiz</button>

    </div>

    <!-- Quiz Page -->
    <div class="container" id="quizPage" style="display:none;">

        <h2>Java MCQ Question</h2>

        <div id="counter"></div>

        <div id="timer">⏰ Time Left: 30 sec</div>

        <div id="question-box">
            <h3 id="question"></h3>
        </div>

        <div id="options"></div>

        <div id="result"></div>

        <button id="nextBtn">Next Question</button>

    </div>

    <!-- Java Questions -->
    <script src="questions.js"></script>

    <!-- jsPDF Library (IMPORTANT) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Quiz Logic -->
    <script src="script.js"></script>

</body>
</html>
